<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 590" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="26" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">Prim's Algorithm &#x2014; Minimum Spanning Tree</text>
  <text x="450" y="44" text-anchor="middle" fill="#27ae60" font-size="12" font-style="italic" font-weight="bold">named after Robert C. Prim (1957) &#x2014; also independently discovered by Jarn&#xED;k (1930) and Dijkstra (1959)</text>
  <text x="450" y="60" text-anchor="middle" fill="#777" font-size="13">Greedy: grow the cheapest spanning tree one edge at a time</text>

  <!-- ===== THE IDEA ===== -->
  <rect x="30" y="70" width="840" height="62" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="450" y="90" text-anchor="middle" fill="#2980b9" font-size="14" font-weight="bold">The Big Idea</text>
  <text x="450" y="108" text-anchor="middle" fill="#555" font-size="12">A <tspan font-weight="bold">Minimum Spanning Tree</tspan> connects every vertex using exactly <tspan font-weight="bold">V&#x2212;1 edges</tspan> with no cycles and the smallest possible total weight.</text>
  <text x="450" y="124" text-anchor="middle" fill="#555" font-size="12">Prim's starts with one vertex and repeatedly adds the cheapest edge that reaches a vertex NOT yet in the MST. Stop when all V vertices are in.</text>

  <!-- ===== VARIABLE LEGEND ===== -->
  <rect x="30" y="146" width="840" height="120" rx="10" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="450" y="166" text-anchor="middle" fill="#27ae60" font-size="14" font-weight="bold">Variable Legend</text>

  <!-- Column 1 -->
  <text x="60" y="188" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#2980b9" font-weight="bold">start</text>
  <text x="130" y="188" fill="#555" font-size="11">the starting vertex &#x2014; any vertex works</text>

  <text x="60" y="208" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#2980b9" font-weight="bold">MST set</text>
  <text x="130" y="208" fill="#555" font-size="11">vertices already added to the growing MST</text>

  <text x="60" y="228" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#2980b9" font-weight="bold">crossing edge</text>
  <text x="160" y="228" fill="#555" font-size="11">edge with one end IN the MST, one OUTSIDE</text>

  <text x="60" y="252" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#2980b9" font-weight="bold">V</text>
  <text x="130" y="252" fill="#555" font-size="11">number of <tspan font-weight="bold">vertices</tspan> in the graph</text>

  <!-- Column 2 -->
  <text x="500" y="188" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#2980b9" font-weight="bold">{w, from, to}</text>
  <text x="600" y="188" fill="#555" font-size="11">edge entry on min-heap (weight first!)</text>

  <text x="500" y="208" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#2980b9" font-weight="bold">min-heap</text>
  <text x="575" y="208" fill="#555" font-size="11">priority queue ordered by smallest weight</text>

  <text x="500" y="228" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#2980b9" font-weight="bold">total weight</text>
  <text x="590" y="228" fill="#555" font-size="11">running sum of chosen edge weights</text>

  <text x="500" y="252" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#2980b9" font-weight="bold">E</text>
  <text x="575" y="252" fill="#555" font-size="11">number of <tspan font-weight="bold">edges</tspan> in the graph</text>

  <!-- ===== THE ALGORITHM ===== -->
  <rect x="30" y="280" width="420" height="238" rx="10" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
  <text x="240" y="300" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">The Algorithm (4 Steps)</text>

  <!-- Step 1 -->
  <circle cx="56" cy="324" r="11" fill="#27ae60"/>
  <text x="56" y="328" text-anchor="middle" fill="white" font-size="11" font-weight="bold">1</text>
  <text x="76" y="322" fill="#555" font-size="11" font-weight="bold">Initialize</text>
  <text x="76" y="336" fill="#777" font-size="10">Add <tspan font-family="Consolas, monospace">start</tspan> to the MST set. Push all of its edges into the min-heap.</text>

  <!-- Step 2 -->
  <circle cx="56" cy="360" r="11" fill="#27ae60"/>
  <text x="56" y="364" text-anchor="middle" fill="white" font-size="11" font-weight="bold">2</text>
  <text x="76" y="358" fill="#555" font-size="11" font-weight="bold">Extract cheapest edge</text>
  <text x="76" y="372" fill="#777" font-size="10">Pop the smallest-weight edge <tspan font-family="Consolas, monospace">{w, from, to}</tspan> from the heap.</text>

  <!-- Step 3 -->
  <circle cx="56" cy="396" r="11" fill="#27ae60"/>
  <text x="56" y="400" text-anchor="middle" fill="white" font-size="11" font-weight="bold">3</text>
  <text x="76" y="394" fill="#555" font-size="11" font-weight="bold">Skip if already in MST</text>
  <text x="76" y="408" fill="#777" font-size="10">If <tspan font-family="Consolas, monospace">to</tspan> is already in the MST, discard &#x2014; adding it would form a cycle.</text>

  <!-- Step 4 -->
  <circle cx="56" cy="434" r="11" fill="#27ae60"/>
  <text x="56" y="438" text-anchor="middle" fill="white" font-size="11" font-weight="bold">4</text>
  <text x="76" y="432" fill="#555" font-size="11" font-weight="bold">Add edge, push new frontier</text>
  <text x="76" y="446" fill="#777" font-size="10">Otherwise add the edge to the MST, add <tspan font-family="Consolas, monospace">to</tspan> to the MST set,</text>
  <text x="76" y="460" fill="#777" font-size="10">and push all of <tspan font-family="Consolas, monospace">to</tspan>'s edges into the heap.</text>

  <text x="240" y="492" text-anchor="middle" fill="#777" font-size="11" font-style="italic">Repeat steps 2&#x2013;4 until the MST has V vertices.</text>
  <text x="240" y="508" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">Result: V&#x2212;1 edges with minimum total weight.</text>

  <!-- ===== EXAMPLE GRAPH ===== -->
  <rect x="470" y="280" width="400" height="238" rx="10" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
  <text x="670" y="300" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">Example Graph (start = A)</text>

  <!-- A (in MST — start) -->
  <circle cx="540" cy="364" r="22" fill="#eafaf1" stroke="#27ae60" stroke-width="2.5"/>
  <text x="540" y="370" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">A</text>
  <text x="540" y="332" text-anchor="middle" fill="#27ae60" font-size="10" font-weight="bold">start</text>
  <text x="540" y="402" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold" font-family="Consolas, monospace">in MST</text>

  <!-- B -->
  <circle cx="660" cy="334" r="22" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="660" y="340" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">B</text>

  <!-- C -->
  <circle cx="660" cy="434" r="22" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="660" y="440" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">C</text>

  <!-- D -->
  <circle cx="800" cy="384" r="22" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="800" y="390" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">D</text>

  <!-- Edges with weights -->
  <line x1="561" y1="357" x2="639" y2="341" stroke="#2980b9" stroke-width="2"/>
  <rect x="588" y="338" width="24" height="18" rx="9" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="600" y="352" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="bold">1</text>

  <line x1="559" y1="375" x2="641" y2="423" stroke="#2980b9" stroke-width="2"/>
  <rect x="588" y="392" width="24" height="18" rx="9" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="600" y="406" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="bold">4</text>

  <line x1="660" y1="356" x2="660" y2="412" stroke="#2980b9" stroke-width="2"/>
  <rect x="648" y="375" width="24" height="18" rx="9" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="660" y="389" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="bold">2</text>

  <line x1="681" y1="342" x2="779" y2="377" stroke="#2980b9" stroke-width="2"/>
  <rect x="718" y="350" width="24" height="18" rx="9" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="730" y="364" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="bold">5</text>

  <line x1="682" y1="428" x2="780" y2="396" stroke="#2980b9" stroke-width="2"/>
  <rect x="720" y="402" width="24" height="18" rx="9" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="732" y="416" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="bold">1</text>

  <text x="670" y="478" text-anchor="middle" fill="#777" font-size="10">Edges: A&#x2013;B(1), A&#x2013;C(4), B&#x2013;C(2), B&#x2013;D(5), C&#x2013;D(1)</text>
  <text x="670" y="502" text-anchor="middle" font-size="10" font-weight="bold"><tspan fill="#27ae60">Initial heap after pushing A's edges: (1, A&#x2013;B), (4, A&#x2013;C)</tspan></text>

  <!-- ===== FOOTER: See trace SVG ===== -->
  <rect x="30" y="534" width="840" height="40" rx="10" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="450" y="552" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">&#x2192; Continue to <tspan font-family="Consolas, monospace">prims_trace.svg</tspan> for the full step-by-step trace on this graph</text>
  <text x="450" y="568" text-anchor="middle" fill="#888" font-size="10">Includes: heap pops, MST-set growth, cycle-skip rule, and time-complexity notes</text>
</svg>
