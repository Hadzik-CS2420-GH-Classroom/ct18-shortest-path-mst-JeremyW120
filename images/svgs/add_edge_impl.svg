<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">add_edge() &#x2014; Weighted Undirected Edge</text>
  <text x="430" y="48" text-anchor="middle" fill="#777" font-size="13">Each edge is stored in both directions as an Edge{to, weight} struct</text>

  <!-- Column headers -->
  <text x="210" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">CODE</text>
  <text x="650" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">WHAT HAPPENS</text>

  <!-- Row backgrounds -->
  <rect x="20" y="78" width="820" height="56" fill="#f9f9f9"/>
  <rect x="20" y="134" width="820" height="56" fill="white"/>
  <rect x="20" y="190" width="820" height="56" fill="#f9f9f9"/>
  <rect x="20" y="246" width="820" height="56" fill="white"/>

  <!-- ===== ROW 1: Function signature ===== -->
  <rect x="30" y="90" width="380" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="108" fill="#569cd6">void</tspan><tspan fill="#dcdcaa"> add_edge</tspan><tspan fill="#ddd">(</tspan><tspan fill="#569cd6">const</tspan><tspan fill="#ddd"> </tspan><tspan fill="#4ec9b0">string</tspan><tspan fill="#ddd">&amp; </tspan><tspan fill="#9cdcfe">from</tspan><tspan fill="#ddd">, </tspan><tspan fill="#569cd6">const</tspan><tspan fill="#ddd"> </tspan><tspan fill="#4ec9b0">string</tspan><tspan fill="#ddd">&amp; </tspan><tspan fill="#9cdcfe">to</tspan><tspan fill="#ddd">, </tspan><tspan fill="#569cd6">int</tspan><tspan fill="#ddd"> </tspan><tspan fill="#9cdcfe">w</tspan><tspan fill="#ddd">) {</tspan>
  </text>

  <line x1="410" y1="103" x2="458" y2="103" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,99 466,103 458,107" fill="#bdc3c7"/>

  <text x="476" y="102" font-size="11" fill="#555">Same signature as CT17 plus a third arg:</text>
  <text x="476" y="118" font-size="11" fill="#555">the numeric <tspan font-weight="bold">weight</tspan> (cost) of the edge.</text>

  <!-- ===== ROW 2: add_vertex safety ===== -->
  <rect x="30" y="146" width="380" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="50" y="164" fill="#dcdcaa">add_vertex</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">from</tspan><tspan fill="#ddd">);  </tspan><tspan fill="#dcdcaa">add_vertex</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">to</tspan><tspan fill="#ddd">);</tspan>
  </text>

  <line x1="410" y1="159" x2="458" y2="159" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,155 466,159 458,163" fill="#bdc3c7"/>

  <text x="476" y="154" font-size="11" fill="#555"><tspan font-weight="bold">Safety:</tspan> create vertices if they don't exist yet.</text>
  <text x="476" y="170" font-size="11" fill="#555">Idempotent &#x2014; safe to call multiple times (no effect if exists).</text>

  <!-- ===== ROW 3: Forward link (blue) ===== -->
  <rect x="30" y="202" width="380" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="50" y="220" fill="#9cdcfe">adj_list_</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">from</tspan><tspan fill="#ddd">].</tspan><tspan fill="#dcdcaa">push_back</tspan><tspan fill="#ddd">({</tspan><tspan fill="#9cdcfe">to</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">w</tspan><tspan fill="#ddd">});</tspan>
  </text>

  <line x1="410" y1="215" x2="458" y2="215" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,211 466,215 458,219" fill="#bdc3c7"/>

  <text x="476" y="210" font-size="11" fill="#2980b9" font-weight="bold">Forward link:</text>
  <text x="476" y="226" font-size="11" fill="#555">Push <tspan font-family="Consolas, monospace" font-size="10">Edge{to, w}</tspan> into <tspan font-family="Consolas, monospace" font-size="10">from</tspan>'s edge vector.</text>

  <!-- ===== ROW 4: Reverse link (red) ===== -->
  <rect x="30" y="258" width="380" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="50" y="276" fill="#9cdcfe">adj_list_</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">to</tspan><tspan fill="#ddd">].</tspan><tspan fill="#dcdcaa">push_back</tspan><tspan fill="#ddd">({</tspan><tspan fill="#9cdcfe">from</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">w</tspan><tspan fill="#ddd">});</tspan>
  </text>

  <line x1="410" y1="271" x2="458" y2="271" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,267 466,271 458,275" fill="#bdc3c7"/>

  <text x="476" y="266" font-size="11" fill="#c0392b" font-weight="bold">Reverse link &#x2014; same weight, opposite direction.</text>
  <text x="476" y="282" font-size="11" fill="#555">Undirected: the cost to go to&#x2192;from equals from&#x2192;to.</text>

  <!-- ===== VISUAL EXAMPLE ===== -->
  <rect x="30" y="314" width="800" height="150" rx="10" fill="#fafafa" stroke="#ccc" stroke-width="1.2"/>
  <text x="430" y="338" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">Example: add_edge("A", "B", 4)</text>

  <!-- Adjacency list label -->
  <text x="160" y="362" text-anchor="middle" fill="#555" font-size="12" font-weight="bold">adj_list_ after call:</text>

  <!-- Column labels -->
  <text x="90" y="376" text-anchor="middle" fill="#888" font-size="9" font-weight="bold">KEY</text>
  <text x="200" y="376" text-anchor="middle" fill="#888" font-size="9" font-weight="bold">EDGE{to, weight}</text>

  <!-- A row -->
  <rect x="70" y="387" width="40" height="24" rx="5" fill="#2980b9"/>
  <text x="90" y="404" text-anchor="middle" fill="white" font-size="11" font-weight="bold">A</text>
  <text x="122" y="404" fill="#999" font-size="14">&#x2192;</text>
  <rect x="140" y="387" width="120" height="24" rx="3" fill="white" stroke="#2980b9" stroke-width="1.5"/>
  <text x="200" y="404" text-anchor="middle" fill="#2980b9" font-size="11" font-weight="bold" font-family="Consolas, monospace">{B, 4}</text>
  <text x="278" y="404" fill="#2980b9" font-size="10" font-style="italic">&#x2190; forward link</text>

  <!-- B row -->
  <rect x="70" y="417" width="40" height="24" rx="5" fill="#c0392b"/>
  <text x="90" y="434" text-anchor="middle" fill="white" font-size="11" font-weight="bold">B</text>
  <text x="122" y="434" fill="#999" font-size="14">&#x2192;</text>
  <rect x="140" y="417" width="120" height="24" rx="3" fill="white" stroke="#c0392b" stroke-width="1.5"/>
  <text x="200" y="434" text-anchor="middle" fill="#c0392b" font-size="11" font-weight="bold" font-family="Consolas, monospace">{A, 4}</text>
  <text x="278" y="434" fill="#c0392b" font-size="10" font-style="italic">reverse link &#x2192;</text>

  <!-- Graph visual -->
  <circle cx="570" cy="410" r="24" fill="white" stroke="#2980b9" stroke-width="2.5"/>
  <text x="570" y="416" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">A</text>
  <line x1="594" y1="410" x2="666" y2="410" stroke="#2c3e50" stroke-width="2"/>
  <circle cx="690" cy="410" r="24" fill="white" stroke="#c0392b" stroke-width="2.5"/>
  <text x="690" y="416" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">B</text>
  <rect x="614" y="386" width="32" height="18" rx="3" fill="#fff3e0" stroke="#e67e22" stroke-width="1"/>
  <text x="630" y="400" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="bold">4</text>
  <text x="630" y="454" text-anchor="middle" fill="#777" font-size="11">weighted undirected edge</text>

  <!-- Footer -->
  <rect x="30" y="474" width="800" height="40" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="492" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Two push_back calls = one undirected weighted edge.</text>
  <text x="430" y="508" text-anchor="middle" fill="#555" font-size="11">The <tspan font-family="Consolas, monospace">Edge</tspan> struct bundles the destination and the cost &#x2014; that's the only change from CT17.</text>
</svg>
