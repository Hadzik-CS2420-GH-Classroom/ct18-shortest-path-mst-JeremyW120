<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">Multi-Hop Cost From Source A &#x2014; The Final Result</text>
  <text x="450" y="52" text-anchor="middle" fill="#777" font-size="13">Even when there&#x2019;s no direct edge, you can reach every vertex &#x2014; Dijkstra&#x2019;s finds the cheapest route</text>

  <!-- ===== LEFT: Graph with shortest-path tree highlighted ===== -->
  <rect x="30" y="70" width="420" height="320" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="240" y="92" text-anchor="middle" fill="#2980b9" font-size="13" font-weight="bold">Cheapest Route From A to Every Vertex</text>

  <!-- Non-tree edges (dashed gray) FIRST so they sit under tree edges -->
  <!-- B-C (not used): A->B direct (4) beats A->C->B (5) -->
  <line x1="259" y1="160" x2="211" y2="210" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="223" y="176" width="24" height="18" rx="9" fill="white" stroke="#bdc3c7" stroke-width="1.2"/>
  <text x="235" y="190" text-anchor="middle" fill="#999" font-size="11">3</text>

  <!-- B-D (not used): A->B->D = 9 loses to A->C->E->D = 6 -->
  <line x1="291" y1="156" x2="349" y2="206" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="308" y="172" width="24" height="18" rx="9" fill="white" stroke="#bdc3c7" stroke-width="1.2"/>
  <text x="320" y="186" text-anchor="middle" fill="#999" font-size="11">5</text>

  <!-- Tree edges (solid green) -->
  <!-- A-B (direct): cost 4 -->
  <line x1="152" y1="150" x2="248" y2="140" stroke="#27ae60" stroke-width="3.5"/>
  <rect x="188" y="130" width="24" height="18" rx="9" fill="#eafaf1" stroke="#27ae60" stroke-width="1.8"/>
  <text x="200" y="144" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">4</text>

  <!-- A-C (direct): cost 2 -->
  <line x1="143" y1="170" x2="187" y2="212" stroke="#27ae60" stroke-width="3.5"/>
  <rect x="153" y="181" width="24" height="18" rx="9" fill="#eafaf1" stroke="#27ae60" stroke-width="1.8"/>
  <text x="165" y="195" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">2</text>

  <!-- C-E (multi-hop): part of A->C->E -->
  <line x1="215" y1="247" x2="285" y2="293" stroke="#27ae60" stroke-width="3.5"/>
  <rect x="238" y="261" width="24" height="18" rx="9" fill="#eafaf1" stroke="#27ae60" stroke-width="1.8"/>
  <text x="250" y="275" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">1</text>

  <!-- D-E (multi-hop): part of A->C->E->D -->
  <line x1="355" y1="238" x2="315" y2="292" stroke="#27ae60" stroke-width="3.5"/>
  <rect x="323" y="256" width="24" height="18" rx="9" fill="#eafaf1" stroke="#27ae60" stroke-width="1.8"/>
  <text x="335" y="270" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">3</text>

  <!-- Vertices with dist labels -->
  <!-- A (source) -->
  <circle cx="130" cy="150" r="24" fill="#fef9e7" stroke="#e67e22" stroke-width="3"/>
  <text x="130" y="156" text-anchor="middle" fill="#e67e22" font-size="15" font-weight="bold">A</text>
  <text x="90" y="154" text-anchor="end" fill="#e67e22" font-size="10" font-weight="bold" font-family="Consolas, monospace">dist[A]=0</text>

  <!-- B -->
  <circle cx="270" cy="140" r="22" fill="#eafaf1" stroke="#27ae60" stroke-width="2.5"/>
  <text x="270" y="146" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">B</text>
  <text x="270" y="110" text-anchor="middle" fill="#27ae60" font-size="10" font-weight="bold" font-family="Consolas, monospace">dist[B]=4</text>

  <!-- C -->
  <circle cx="200" cy="230" r="22" fill="#eafaf1" stroke="#27ae60" stroke-width="2.5"/>
  <text x="200" y="236" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">C</text>
  <text x="160" y="234" text-anchor="end" fill="#27ae60" font-size="10" font-weight="bold" font-family="Consolas, monospace">dist[C]=2</text>

  <!-- D -->
  <circle cx="370" cy="220" r="22" fill="#eafaf1" stroke="#27ae60" stroke-width="2.5"/>
  <text x="370" y="226" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">D</text>
  <text x="444" y="224" text-anchor="end" fill="#27ae60" font-size="10" font-weight="bold" font-family="Consolas, monospace">dist[D]=6</text>

  <!-- E -->
  <circle cx="300" cy="310" r="22" fill="#eafaf1" stroke="#27ae60" stroke-width="2.5"/>
  <text x="300" y="316" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">E</text>
  <text x="340" y="314" text-anchor="start" fill="#27ae60" font-size="10" font-weight="bold" font-family="Consolas, monospace">dist[E]=3</text>

  <!-- Legend -->
  <line x1="50" y1="354" x2="80" y2="354" stroke="#27ae60" stroke-width="3.5"/>
  <text x="88" y="358" fill="#555" font-size="11">edge used in a shortest path from A</text>
  <line x1="50" y1="374" x2="80" y2="374" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="88" y="378" fill="#555" font-size="11">edge exists, but a cheaper route wins</text>

  <!-- ===== RIGHT: Result Table ===== -->
  <rect x="470" y="70" width="400" height="320" rx="10" fill="#fafafa" stroke="#e67e22" stroke-width="1.5"/>
  <text x="670" y="92" text-anchor="middle" fill="#e67e22" font-size="13" font-weight="bold">Result of dijkstra(&quot;A&quot;) &#x2014; the dist[] array</text>

  <!-- Header -->
  <rect x="490" y="104" width="360" height="28" rx="4" fill="#e67e22"/>
  <text x="525" y="123" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Consolas, monospace">v</text>
  <text x="600" y="123" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Consolas, monospace">dist[v]</text>
  <text x="745" y="123" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Shortest Path</text>

  <!-- Row A -->
  <rect x="490" y="132" width="360" height="32" fill="#ffffff" stroke="#e5e5e5"/>
  <text x="525" y="153" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">A</text>
  <text x="600" y="153" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">0</text>
  <text x="745" y="153" text-anchor="middle" fill="#777" font-size="11" font-style="italic">(source)</text>

  <!-- Row B (direct) -->
  <rect x="490" y="164" width="360" height="32" fill="#eafaf1" stroke="#e5e5e5"/>
  <text x="525" y="185" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">B</text>
  <text x="600" y="185" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">4</text>
  <text x="745" y="185" text-anchor="middle" fill="#555" font-size="11" font-family="Consolas, monospace">A &#x2192; B</text>

  <!-- Row C (direct) -->
  <rect x="490" y="196" width="360" height="32" fill="#eafaf1" stroke="#e5e5e5"/>
  <text x="525" y="217" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">C</text>
  <text x="600" y="217" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">2</text>
  <text x="745" y="217" text-anchor="middle" fill="#555" font-size="11" font-family="Consolas, monospace">A &#x2192; C</text>

  <!-- Row D (multi-hop: 3 edges!) -->
  <rect x="490" y="228" width="360" height="40" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="525" y="253" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">D</text>
  <text x="600" y="253" text-anchor="middle" fill="#e67e22" font-size="13" font-weight="bold">6</text>
  <text x="745" y="249" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="bold" font-family="Consolas, monospace">A &#x2192; C &#x2192; E &#x2192; D</text>
  <text x="745" y="262" text-anchor="middle" fill="#888" font-size="9">(2 + 1 + 3)</text>

  <!-- Row E (multi-hop) -->
  <rect x="490" y="268" width="360" height="40" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="525" y="293" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">E</text>
  <text x="600" y="293" text-anchor="middle" fill="#e67e22" font-size="13" font-weight="bold">3</text>
  <text x="745" y="289" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="bold" font-family="Consolas, monospace">A &#x2192; C &#x2192; E</text>
  <text x="745" y="302" text-anchor="middle" fill="#888" font-size="9">(2 + 1)</text>

  <!-- Legend -->
  <rect x="490" y="322" width="14" height="14" rx="2" fill="#eafaf1" stroke="#27ae60" stroke-width="1.2"/>
  <text x="510" y="334" fill="#555" font-size="10">direct edge from A</text>
  <rect x="620" y="322" width="14" height="14" rx="2" fill="#fff3e0" stroke="#e67e22" stroke-width="1.2"/>
  <text x="640" y="334" fill="#555" font-size="10">multi-hop (2+ edges)</text>

  <!-- Key insight -->
  <text x="670" y="362" text-anchor="middle" fill="#2c3e50" font-size="11" font-style="italic">D has no direct edge from A &#x2014;</text>
  <text x="670" y="378" text-anchor="middle" fill="#2c3e50" font-size="11" font-style="italic">but <tspan font-family="Consolas, monospace" font-style="normal">dist[D] = 6</tspan> via a multi-hop route.</text>

  <!-- ===== BOTTOM: Why this is surprising ===== -->
  <rect x="30" y="406" width="840" height="160" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="450" y="430" text-anchor="middle" fill="#e67e22" font-size="13" font-weight="bold">Notice: Fewer Edges &#x2260; Cheaper Path</text>

  <text x="60" y="454" fill="#555" font-size="11">Look at vertex <tspan font-weight="bold" fill="#e67e22">D</tspan>. There are three ways to get from A to D:</text>

  <text x="80" y="476" fill="#555" font-size="11" font-family="Consolas, monospace">
    A &#x2192; B &#x2192; D  = 4 + 5  = <tspan fill="#c0392b" font-weight="bold">9</tspan>
    <tspan fill="#999">     (2 edges)</tspan>
  </text>
  <text x="80" y="494" fill="#555" font-size="11" font-family="Consolas, monospace">
    A &#x2192; C &#x2192; B &#x2192; D = 2 + 3 + 5 = <tspan fill="#c0392b" font-weight="bold">10</tspan>
    <tspan fill="#999">    (3 edges)</tspan>
  </text>
  <text x="80" y="512" fill="#555" font-size="11" font-family="Consolas, monospace">
    A &#x2192; C &#x2192; E &#x2192; D = 2 + 1 + 3 = <tspan fill="#27ae60" font-weight="bold">6</tspan> &#x2713;
    <tspan fill="#999">  (3 edges &#x2014; the LONGEST route in edge count, but the CHEAPEST in cost)</tspan>
  </text>

  <text x="60" y="540" fill="#555" font-size="11">This is exactly why <tspan font-weight="bold" fill="#2980b9">BFS doesn&#x2019;t work</tspan> on weighted graphs &#x2014; it finds the path with the fewest edges, not the lowest total weight.</text>
  <text x="60" y="556" fill="#555" font-size="11">Dijkstra&#x2019;s algorithm is what fills in the <tspan font-weight="bold">Cost</tspan> and <tspan font-weight="bold">Shortest Path</tspan> columns above.</text>
</svg>
