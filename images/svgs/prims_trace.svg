<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="26" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">Prim's Algorithm &#x2014; Step-by-Step Trace</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="13">Tracing Prim's from start A on the example graph: A&#x2013;B(1), A&#x2013;C(4), B&#x2013;C(2), B&#x2013;D(5), C&#x2013;D(1)</text>

  <!-- ===== VARIABLE LEGEND (repeated from overview) ===== -->
  <rect x="30" y="66" width="840" height="120" rx="10" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="450" y="86" text-anchor="middle" fill="#27ae60" font-size="14" font-weight="bold">Variable Legend</text>

  <!-- Column 1 -->
  <text x="60" y="108" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#2980b9" font-weight="bold">start</text>
  <text x="130" y="108" fill="#555" font-size="11">the starting vertex &#x2014; any vertex works</text>

  <text x="60" y="128" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#2980b9" font-weight="bold">MST set</text>
  <text x="130" y="128" fill="#555" font-size="11">vertices already added to the growing MST</text>

  <text x="60" y="148" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#2980b9" font-weight="bold">crossing edge</text>
  <text x="160" y="148" fill="#555" font-size="11">edge with one end IN the MST, one OUTSIDE</text>

  <text x="60" y="172" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#2980b9" font-weight="bold">V</text>
  <text x="130" y="172" fill="#555" font-size="11">number of <tspan font-weight="bold">vertices</tspan> in the graph</text>

  <!-- Column 2 -->
  <text x="500" y="108" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#2980b9" font-weight="bold">{w, from, to}</text>
  <text x="600" y="108" fill="#555" font-size="11">edge entry on min-heap (weight first!)</text>

  <text x="500" y="128" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#2980b9" font-weight="bold">min-heap</text>
  <text x="575" y="128" fill="#555" font-size="11">priority queue ordered by smallest weight</text>

  <text x="500" y="148" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#2980b9" font-weight="bold">total weight</text>
  <text x="590" y="148" fill="#555" font-size="11">running sum of chosen edge weights</text>

  <text x="500" y="172" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#2980b9" font-weight="bold">E</text>
  <text x="575" y="172" fill="#555" font-size="11">number of <tspan font-weight="bold">edges</tspan> in the graph</text>

  <!-- ===== CALLOUT: How does Prim's avoid cycles? ===== -->
  <rect x="30" y="200" width="840" height="64" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="450" y="220" text-anchor="middle" fill="#2980b9" font-size="13" font-weight="bold">What if a popped edge leads to a vertex already in the MST?</text>
  <text x="450" y="238" text-anchor="middle" fill="#555" font-size="11">Skip it &#x2014; adding it would create a cycle. The heap can contain stale edges that were pushed before their destination joined the MST.</text>
  <text x="450" y="254" text-anchor="middle" fill="#555" font-size="11">In this trace the MST completes before any skip is needed, but with more edges or a different graph the skip rule will kick in.</text>

  <!-- ===== TRACE ===== -->
  <text x="450" y="282" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">Step-by-Step Trace</text>

  <rect x="30" y="294" width="840" height="26" rx="4" fill="#27ae60"/>
  <text x="60" y="312" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Step</text>
  <text x="170" y="312" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Heap pop</text>
  <text x="430" y="312" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Action</text>
  <text x="680" y="312" text-anchor="middle" fill="white" font-size="11" font-weight="bold">MST set</text>
  <text x="820" y="312" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Total wt</text>

  <!-- Step 0: Initialize -->
  <rect x="30" y="324" width="840" height="28" fill="#f0faf0"/>
  <text x="60" y="342" text-anchor="middle" fill="#555" font-size="11" font-weight="bold">0</text>
  <text x="170" y="342" text-anchor="middle" fill="#888" font-size="10">(nothing yet)</text>
  <text x="430" y="342" text-anchor="middle" fill="#777" font-size="10">seed: add A to MST, push A's edges <tspan font-family="Consolas, monospace" font-size="9">(1,A&#x2013;B), (4,A&#x2013;C)</tspan></text>
  <text x="680" y="342" text-anchor="middle" fill="#555" font-size="11" font-family="Consolas, monospace">{A}</text>
  <text x="820" y="342" text-anchor="middle" fill="#555" font-size="11">0</text>

  <!-- Step 1: Pop A-B -->
  <rect x="30" y="356" width="840" height="28" fill="white"/>
  <text x="60" y="374" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">1</text>
  <text x="170" y="374" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold" font-family="Consolas, monospace">{1, A&#x2013;B}</text>
  <text x="430" y="374" text-anchor="middle" fill="#555" font-size="10"><tspan fill="#27ae60" font-weight="bold">Accept</tspan> &#x2192; add B to MST, push <tspan font-family="Consolas, monospace" font-size="9">(2,B&#x2013;C), (5,B&#x2013;D)</tspan></text>
  <text x="680" y="374" text-anchor="middle" fill="#555" font-size="11" font-family="Consolas, monospace">{A, B}</text>
  <text x="820" y="374" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">1</text>

  <!-- Step 2: Pop B-C -->
  <rect x="30" y="388" width="840" height="28" fill="#f0faf0"/>
  <text x="60" y="406" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">2</text>
  <text x="170" y="406" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold" font-family="Consolas, monospace">{2, B&#x2013;C}</text>
  <text x="430" y="406" text-anchor="middle" fill="#555" font-size="10"><tspan fill="#27ae60" font-weight="bold">Accept</tspan> &#x2192; add C to MST, push <tspan font-family="Consolas, monospace" font-size="9">(1,C&#x2013;D)</tspan></text>
  <text x="680" y="406" text-anchor="middle" fill="#555" font-size="11" font-family="Consolas, monospace">{A, B, C}</text>
  <text x="820" y="406" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">3</text>

  <!-- Step 3: Pop C-D -->
  <rect x="30" y="420" width="840" height="28" fill="white"/>
  <text x="60" y="438" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">3</text>
  <text x="170" y="438" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold" font-family="Consolas, monospace">{1, C&#x2013;D}</text>
  <text x="430" y="438" text-anchor="middle" fill="#555" font-size="10"><tspan fill="#27ae60" font-weight="bold">Accept</tspan> &#x2192; add D to MST &#x2014; MST now has V=4 vertices, done!</text>
  <text x="680" y="438" text-anchor="middle" fill="#555" font-size="11" font-family="Consolas, monospace">{A, B, C, D}</text>
  <text x="820" y="438" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">4</text>

  <!-- Done -->
  <rect x="30" y="452" width="840" height="28" fill="#eafaf1"/>
  <text x="80" y="470" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">&#x2714;</text>
  <text x="450" y="470" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">Done &#x2014; MST edges: A&#x2013;B(1), B&#x2013;C(2), C&#x2013;D(1) &#x2014; total weight = 4</text>

  <!-- ===== FOOTER: See result SVG ===== -->
  <rect x="30" y="492" width="840" height="34" rx="10" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="450" y="514" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">&#x2192; Continue to <tspan font-family="Consolas, monospace">prims_result.svg</tspan> for the MST visualization and key facts</text>
</svg>
