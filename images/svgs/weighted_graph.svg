<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 634" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">Weighted Graph &#x2014; Edges Have Costs</text>
  <text x="450" y="52" text-anchor="middle" fill="#777" font-size="13">Each edge stores a numeric weight &#x2014; enables shortest path and minimum spanning tree algorithms</text>

  <!-- ===== LEFT: Visual graph ===== -->
  <rect x="30" y="70" width="420" height="300" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="240" y="92" text-anchor="middle" fill="#2980b9" font-size="13" font-weight="bold">Visual Representation</text>

  <!-- Vertices -->
  <circle cx="130" cy="150" r="22" fill="white" stroke="#2980b9" stroke-width="2.5"/>
  <text x="130" y="156" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">A</text>

  <circle cx="270" cy="140" r="22" fill="white" stroke="#2980b9" stroke-width="2.5"/>
  <text x="270" y="146" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">B</text>

  <circle cx="200" cy="230" r="22" fill="white" stroke="#2980b9" stroke-width="2.5"/>
  <text x="200" y="236" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">C</text>

  <circle cx="370" cy="220" r="22" fill="white" stroke="#2980b9" stroke-width="2.5"/>
  <text x="370" y="226" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">D</text>

  <circle cx="300" cy="310" r="22" fill="white" stroke="#2980b9" stroke-width="2.5"/>
  <text x="300" y="316" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">E</text>

  <!-- Edges with weights -->
  <line x1="152" y1="150" x2="248" y2="140" stroke="#2980b9" stroke-width="2"/>
  <rect x="188" y="130" width="24" height="18" rx="9" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="200" y="144" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="bold">4</text>

  <line x1="143" y1="170" x2="187" y2="212" stroke="#2980b9" stroke-width="2"/>
  <rect x="153" y="181" width="24" height="18" rx="9" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="165" y="195" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="bold">2</text>

  <line x1="259" y1="160" x2="211" y2="210" stroke="#2980b9" stroke-width="2"/>
  <rect x="223" y="176" width="24" height="18" rx="9" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="235" y="190" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="bold">3</text>

  <line x1="291" y1="156" x2="349" y2="206" stroke="#2980b9" stroke-width="2"/>
  <rect x="308" y="172" width="24" height="18" rx="9" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="320" y="186" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="bold">5</text>

  <line x1="215" y1="247" x2="285" y2="293" stroke="#2980b9" stroke-width="2"/>
  <rect x="238" y="261" width="24" height="18" rx="9" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="250" y="275" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="bold">1</text>

  <line x1="355" y1="238" x2="315" y2="292" stroke="#2980b9" stroke-width="2"/>
  <rect x="323" y="256" width="24" height="18" rx="9" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="335" y="270" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="bold">3</text>

  <!-- Legend -->
  <rect x="50" y="335" width="20" height="14" rx="7" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="78" y="346" fill="#555" font-size="11">orange oval = edge weight (cost to travel)</text>

  <!-- ===== RIGHT: Data Structure ===== -->
  <rect x="470" y="70" width="400" height="300" rx="10" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="670" y="92" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">Data Structure: unordered_map of Edge vectors</text>

  <!-- Edge struct -->
  <text x="490" y="116" fill="#555" font-size="11" font-weight="bold">Edge struct:</text>
  <rect x="490" y="122" width="240" height="46" rx="6" fill="#1e1e1e"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="11">
    <tspan x="504" y="140" fill="#569cd6">struct</tspan><tspan fill="#ddd"> </tspan><tspan fill="#4ec9b0">Edge</tspan><tspan fill="#ddd"> {</tspan>
    <tspan x="514" y="156" fill="#4ec9b0">string</tspan><tspan fill="#ddd"> to;  </tspan><tspan fill="#569cd6">int</tspan><tspan fill="#ddd"> weight;</tspan>
  </text>

  <!-- adj_list_ entries -->
  <text x="490" y="186" fill="#555" font-size="11" font-weight="bold">adj_list_:</text>

  <!-- A row -->
  <rect x="490" y="194" width="30" height="22" rx="4" fill="#27ae60"/>
  <text x="505" y="210" text-anchor="middle" fill="white" font-size="11" font-weight="bold">A</text>
  <text x="527" y="210" fill="#999" font-size="12">&#x2192;</text>
  <rect x="544" y="194" width="56" height="22" rx="3" fill="white" stroke="#27ae60" stroke-width="1.2"/>
  <text x="572" y="210" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">{B, 4}</text>
  <rect x="606" y="194" width="56" height="22" rx="3" fill="white" stroke="#27ae60" stroke-width="1.2"/>
  <text x="634" y="210" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">{C, 2}</text>

  <!-- B row -->
  <rect x="490" y="220" width="30" height="22" rx="4" fill="#27ae60"/>
  <text x="505" y="236" text-anchor="middle" fill="white" font-size="11" font-weight="bold">B</text>
  <text x="527" y="236" fill="#999" font-size="12">&#x2192;</text>
  <rect x="544" y="220" width="56" height="22" rx="3" fill="white" stroke="#27ae60" stroke-width="1.2"/>
  <text x="572" y="236" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">{A, 4}</text>
  <rect x="606" y="220" width="56" height="22" rx="3" fill="white" stroke="#27ae60" stroke-width="1.2"/>
  <text x="634" y="236" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">{C, 3}</text>
  <rect x="668" y="220" width="56" height="22" rx="3" fill="white" stroke="#27ae60" stroke-width="1.2"/>
  <text x="696" y="236" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">{D, 5}</text>

  <!-- C row -->
  <rect x="490" y="246" width="30" height="22" rx="4" fill="#27ae60"/>
  <text x="505" y="262" text-anchor="middle" fill="white" font-size="11" font-weight="bold">C</text>
  <text x="527" y="262" fill="#999" font-size="12">&#x2192;</text>
  <rect x="544" y="246" width="56" height="22" rx="3" fill="white" stroke="#27ae60" stroke-width="1.2"/>
  <text x="572" y="262" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">{A, 2}</text>
  <rect x="606" y="246" width="56" height="22" rx="3" fill="white" stroke="#27ae60" stroke-width="1.2"/>
  <text x="634" y="262" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">{B, 3}</text>
  <rect x="668" y="246" width="56" height="22" rx="3" fill="white" stroke="#27ae60" stroke-width="1.2"/>
  <text x="696" y="262" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">{E, 1}</text>

  <!-- D row -->
  <rect x="490" y="272" width="30" height="22" rx="4" fill="#27ae60"/>
  <text x="505" y="288" text-anchor="middle" fill="white" font-size="11" font-weight="bold">D</text>
  <text x="527" y="288" fill="#999" font-size="12">&#x2192;</text>
  <rect x="544" y="272" width="56" height="22" rx="3" fill="white" stroke="#27ae60" stroke-width="1.2"/>
  <text x="572" y="288" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">{B, 5}</text>
  <rect x="606" y="272" width="56" height="22" rx="3" fill="white" stroke="#27ae60" stroke-width="1.2"/>
  <text x="634" y="288" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">{E, 3}</text>

  <!-- E row -->
  <rect x="490" y="298" width="30" height="22" rx="4" fill="#27ae60"/>
  <text x="505" y="314" text-anchor="middle" fill="white" font-size="11" font-weight="bold">E</text>
  <text x="527" y="314" fill="#999" font-size="12">&#x2192;</text>
  <rect x="544" y="298" width="56" height="22" rx="3" fill="white" stroke="#27ae60" stroke-width="1.2"/>
  <text x="572" y="314" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">{C, 1}</text>
  <rect x="606" y="298" width="56" height="22" rx="3" fill="white" stroke="#27ae60" stroke-width="1.2"/>
  <text x="634" y="314" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">{D, 3}</text>

  <!-- Declaration -->
  <rect x="490" y="330" width="360" height="22" rx="4" fill="#1e1e1e"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="500" y="346" fill="#4ec9b0">unordered_map</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">string</tspan><tspan fill="#ddd">, </tspan><tspan fill="#4ec9b0">vector</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">Edge</tspan><tspan fill="#ddd">&gt;&gt; adj_list_;</tspan>
  </text>

  <!-- ===== UNWEIGHTED VS WEIGHTED ===== -->
  <rect x="30" y="386" width="840" height="110" rx="10" fill="#fafafa" stroke="#ccc" stroke-width="1.2"/>
  <text x="450" y="410" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">CT17 (Unweighted) vs CT18 (Weighted)</text>

  <text x="60" y="436" fill="#2980b9" font-size="11" font-weight="bold">CT17:</text>
  <text x="110" y="436" fill="#555" font-size="11" font-family="Consolas, monospace">vector&lt;string&gt;</text>
  <text x="240" y="436" fill="#555" font-size="11">&#x2014; just neighbor names. Every edge "costs" the same (1).</text>
  <text x="110" y="452" fill="#777" font-size="10">BFS finds shortest path = fewest edges.</text>

  <text x="60" y="474" fill="#e67e22" font-size="11" font-weight="bold">CT18:</text>
  <text x="110" y="474" fill="#555" font-size="11" font-family="Consolas, monospace">vector&lt;Edge&gt;</text>
  <text x="220" y="474" fill="#555" font-size="11">&#x2014; each neighbor stores both the destination AND the weight.</text>
  <text x="110" y="490" fill="#777" font-size="10">Dijkstra's finds shortest path = lowest total weight (not fewest edges).</text>

  <!-- ===== REAL-WORLD EXAMPLES ===== -->
  <rect x="30" y="510" width="840" height="110" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="1.2"/>
  <text x="450" y="530" text-anchor="middle" fill="#e67e22" font-size="13" font-weight="bold">&#x1F30D; Real-World Examples of Weighted Graphs</text>

  <text x="60" y="552" fill="#555" font-size="11"><tspan font-weight="bold">GPS / Road maps:</tspan> vertices = intersections, edges = roads, weights = distance or travel time</text>
  <text x="60" y="570" fill="#555" font-size="11"><tspan font-weight="bold">Network routing:</tspan> vertices = routers, edges = network links, weights = latency or bandwidth cost</text>
  <text x="60" y="588" fill="#555" font-size="11"><tspan font-weight="bold">Flight planning:</tspan> vertices = airports, edges = direct flights, weights = price or flight duration</text>
  <text x="60" y="606" fill="#555" font-size="11"><tspan font-weight="bold">Utility networks:</tspan> vertices = buildings, edges = cables/pipes, weights = installation cost (MST!)</text>
</svg>
